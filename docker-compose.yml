services:
  neptune:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      MAX_VIDEO_DURATION_SECONDS: ${MAX_VIDEO_DURATION_SECONDS:-600}
      TEMP_FILE_TTL_MINUTES: ${TEMP_FILE_TTL_MINUTES:-30}
      TEMP_DIR: /tmp/neptune
      MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-2}
      JOB_TIMEOUT_SECONDS: ${JOB_TIMEOUT_SECONDS:-900}
      DOWNLOAD_BASE_URL: ${DOWNLOAD_BASE_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      AUDIO_ANALYSIS_SAMPLE_SECONDS: ${AUDIO_ANALYSIS_SAMPLE_SECONDS:-180}
      PYTHON_BIN: python3
      YT_DLP_BIN: yt-dlp
      FFMPEG_BIN: ffmpeg
    volumes:
      - neptune_tmp:/tmp/neptune
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  neptune_tmp:
